name: Publish

# Publish triggers:
#   - push to main  → publishes a .devN pre-release to PyPI (continuous dev build;
#                     no GitHub Release is created)
#   - v* tag push   → publishes the clean release to PyPI AND creates a GitHub Release
#   - workflow_dispatch (tag input) → same as tag push (manual release)
on:
  push:
    branches: [main]
    tags: ["v[0-9]*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v2026.6.0)"
        required: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # contents: write is required by softprops/action-gh-release (the "Create GitHub Release"
  # step).  GitHub Actions does not support per-step permission overrides, so the only clean
  # way to scope this down would be to split the job.  The release step is already guarded by
  # `if: github.ref_type == 'tag' || ...`, so on main-branch pushes the write access is
  # unused but unavoidable without a job split that would add complexity for minimal gain.
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      # inputs.tag is only set for workflow_dispatch; on branch/tag pushes github.ref is used.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Log plugin.json version (informational)
        # Run only for tag/dispatch releases; skip for dev builds pushed to main.
        # Prerelease tags (aN/bN/rcN/.devN) are exempt - plugin.json tracks stable only.
        # The sync-plugin-manifest job (below) auto-bumps plugin.json on main after publish;
        # a mismatch here is expected when the maintainer tags without a prior release-prep PR.
        # The context value is passed via env: to avoid ${{ }} script-injection into the run body.
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        env:
          EFFECTIVE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # Strip a leading 'v' from the env-provided tag value.
          version="${EFFECTIVE_TAG#v}"
          # Skip prerelease tags (aN/bN/rcN suffixes or .dev in the version string).
          if echo "$version" | grep -qE '(a|b|rc)[0-9]*$|\.dev'; then
            echo "Prerelease tag '$version' detected - plugin.json tracks stable only; skipping."
            exit 0
          fi
          # Stable tag: log plugin.json version for reference (mismatch is not an error here).
          plugin_version=$(python3 -c "import json; print(json.load(open('plugins/fabric-dw/.claude-plugin/plugin.json'))['version'])")
          if [ "$plugin_version" != "$version" ]; then
            echo "plugin.json is at '$plugin_version'; tag is '$version'. The sync-plugin-manifest job will bump it."
          else
            echo "plugin.json version '$plugin_version' already matches tag '$version'."
          fi

      - run: uv sync --frozen --no-dev

      - run: uv build

      - name: Generate CycloneDX SBOM
        # Use `--from cyclonedx-bom` to invoke the real tool (not the unrelated `cyclonedx-py`
        # package on PyPI, which does not accept --outfile and would fail with exit 2).
        # Flags: --of JSON (output format), -o <file> (output file) — correct for cyclonedx-bom.
        # continue-on-error: true so an SBOM failure can never block the PyPI publish.
        continue-on-error: true
        run: |
          uvx --from 'cyclonedx-bom==7.3.0' cyclonedx-py environment --of JSON -o dist/sbom.cdx.json "$(uv python find)"
          python3 -c "import json,sys; d=json.load(open('dist/sbom.cdx.json')); print(f'SBOM: {len(d.get(\"components\",[]))} components')"

      - name: Upload SBOM artifact
        # Only upload if the SBOM was actually generated (SBOM step may have been skipped/failed).
        if: ${{ hashFiles('dist/sbom.cdx.json') != '' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: dist/sbom.cdx.json
          if-no-files-found: warn

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI (OIDC)
        # hatch-vcs derives a unique .devN version per commit (distance since last v* tag),
        # so a re-run would try to upload an already-existing version.  PyPI returns HTTP 400
        # with "File already exists" in that case.  We treat that specific error as success
        # (idempotent re-run) while still propagating any other failure.
        #
        # GHA runs every `run:` block as `bash --noprofile --norc -eo pipefail {0}`, so `-e`
        # is already active.  We must disable it around the pipeline so that a non-zero exit
        # from `uv publish` does not abort the shell before we can inspect the output.
        run: |
          set +e
          uv publish --trusted-publishing always 2>&1 | tee /tmp/uv_publish_output.txt
          exit_code=${PIPESTATUS[0]}
          set -eo pipefail
          if [ "$exit_code" -ne 0 ]; then
            if grep -qiE 'already been registered|file[^ ]* already exist' /tmp/uv_publish_output.txt; then
              echo "Version already on PyPI — treating as success (idempotent re-run)."
            else
              echo "Publish failed for an unexpected reason:" >&2
              cat /tmp/uv_publish_output.txt >&2
              exit "$exit_code"
            fi
          fi

      - name: Determine prerelease flag
        id: prerelease
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        env:
          EFFECTIVE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          version="${EFFECTIVE_TAG#v}"
          if echo "$version" | grep -qE '(a|b|rc)[0-9]*$|\.dev'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (tag only)
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.cdx.json
          fail_on_unmatched_files: false
          generate_release_notes: true
          name: ${{ inputs.tag || github.ref_name }}
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}

  sync-plugin-manifest:
    name: Sync plugin manifests to default branch
    runs-on: ubuntu-latest
    needs: publish
    # Run only for tag/dispatch triggers (never for branch pushes or PRs).
    # Stable-vs-prerelease gating is handled inside the run body using the same
    # regex the repo already uses elsewhere. This job NEVER runs on plain pushes
    # to the default branch - it only fires after a v* tag push or workflow_dispatch.
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    env:
      # Passed via env: to avoid ${{ }} script-injection into the run body.
      EFFECTIVE_TAG: ${{ inputs.tag || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      # Check out the default branch (not the tag) so we can commit and push.
      # Use RELEASE_BUMP_TOKEN (a fine-grained admin PAT, Contents: Read+Write) so the
      # push bypasses branch protection. Unlike GITHUB_TOKEN, a PAT push DOES trigger
      # workflow runs, making [skip ci] in the commit message REQUIRED (not optional).
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BUMP_TOKEN }}

      - name: Bump plugin manifest versions on default branch
        run: |
          version="${EFFECTIVE_TAG#v}"
          # Skip prerelease tags (aN/bN/rcN suffixes or .dev in the version string).
          if echo "$version" | grep -qE '(a|b|rc)[0-9]*$|\.dev'; then
            echo "Prerelease tag '$version' - plugin manifests track stable only; skipping bump."
            exit 0
          fi
          # Strict calver validation BEFORE touching any file. Guards against junk
          # workflow_dispatch inputs and tag glob edge cases (e.g. v1.0.0 or a tag with
          # a sed metacharacter). Same regex as the justfile _CALVER_RE.
          if ! echo "$version" | grep -qE '^20[0-9]{2}\.([1-9]|1[0-2])\.(0|[1-9][0-9]*)$'; then
            echo "::error::Derived version '$version' does not match expected calver format (YYYY.M.N). Aborting." >&2
            exit 1
          fi
          # plugins/fabric-dw/.claude-plugin/plugin.json is the version source of truth;
          # plugins/fabric-dw/.github/plugin/plugin.json is its Copilot CLI mirror and must
          # never drift from it. Both carry a "version" field, so both are bumped here. The
          # root marketplace.json files intentionally omit "version" (optional per the Claude
          # Code / Copilot CLI marketplace schema) so they need no bump.
          plugin_manifests=(
            "plugins/fabric-dw/.claude-plugin/plugin.json"
            "plugins/fabric-dw/.github/plugin/plugin.json"
          )
          changed=()
          for plugin_json in "${plugin_manifests[@]}"; do
            # Monotonicity guard: refuse to write a version older than what is already on HEAD.
            # Prevents an old re-run or stale workflow_dispatch from regressing a manifest.
            current_version=$(python3 -c "import json; print(json.load(open('$plugin_json'))['version'])")
            # Single physical line, no leading whitespace before "import": a multi-line
            # python -c body indented to satisfy this YAML block's minimum indentation would
            # pass that literal leading whitespace to python3, which raises IndentationError
            # since "import sys" would not be the first statement at column 0.
            is_downgrade=$(python3 -c "import sys; cur = tuple(int(x) for x in sys.argv[1].split('.')); new = tuple(int(x) for x in sys.argv[2].split('.')); print('yes' if new < cur else 'no')" "$current_version" "$version")
            if [ "$is_downgrade" = "yes" ]; then
              echo "Notice: tag '$version' is older than current $plugin_json '$current_version' - skipping to prevent downgrade."
              continue
            fi
            # Set the version in the manifest, preserving key order, indentation, and
            # trailing newline byte-for-byte (same sed approach as the 'just release' recipe).
            sed -i 's/"version": "[^"]*"/"version": "'"$version"'"/' "$plugin_json"
            if ! git diff --quiet "$plugin_json"; then
              changed+=("$plugin_json")
            fi
          done
          # No-op guard: if no manifest changed, skip the commit.
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "Plugin manifests already at '$version' - nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${changed[@]}"
          # [skip ci] is REQUIRED: a PAT push (unlike GITHUB_TOKEN) triggers workflow runs,
          # so omitting it would spawn an unwanted dev-build on the default branch.
          git commit -m "chore: bump plugin manifests to $version [skip ci]"
          # Push with bounded retry to handle non-fast-forward races
          # (the default branch may have advanced after the tag was cut).
          max_attempts=3
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            if git push origin "$DEFAULT_BRANCH"; then
              echo "Pushed plugin manifest bump for $version to $DEFAULT_BRANCH."
              break
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "::error::Failed to push to $DEFAULT_BRANCH after $max_attempts attempts." >&2
              exit 1
            fi
            echo "Push attempt $attempt failed (non-fast-forward?), fetching and rebasing..."
            git fetch origin "$DEFAULT_BRANCH"
            # Use an explicit if to prevent set -e from aborting before we can emit
            # a structured error annotation on rebase conflict.
            if ! git rebase "origin/$DEFAULT_BRANCH"; then
              git rebase --abort 2>/dev/null || true
              echo "::error::Rebase onto origin/$DEFAULT_BRANCH failed - resolve the conflict manually and re-run." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
          done
