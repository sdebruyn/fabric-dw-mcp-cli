name: Docker

on:
  push:
    branches: [main]
    tags: ["v[0-9]*"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --frozen --no-dev

      - name: Compute Docker tags and version
        id: docker_tags
        run: |
          VERSION=$(uv run python -c "import fabric_dw; print(fabric_dw.__version__)")
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tags=ghcr.io/sdebruyn/fabric-dw:${VERSION},ghcr.io/sdebruyn/fabric-dw:latest" >> "${GITHUB_OUTPUT}"
          else
            echo "tags=ghcr.io/sdebruyn/fabric-dw:${VERSION},ghcr.io/sdebruyn/fabric-dw:main" >> "${GITHUB_OUTPUT}"
          fi

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
        id: buildx

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.docker_tags.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/sdebruyn/fabric-dw
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify image pushed
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
        run: docker manifest inspect ghcr.io/sdebruyn/fabric-dw:${{ steps.docker_tags.outputs.version }}
