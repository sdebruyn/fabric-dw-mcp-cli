repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - "azure-identity>=1.19"
          - "azure-core>=1.30"
          - "pydantic>=2.9"
          - "pytest"
          - "httpx[http2]>=0.27"
          - "aiolimiter>=1.2"
          - "tenacity>=9"
          - "respx>=0.21"
          - "freezegun>=1.5"
          - "mssql-python>=0.13"
          - "filelock>=3.16"
          - "click>=8.2"
          - "rich>=14"
          - "anyio>=4"
          - "mcp[cli]>=1.0"
        args: ["--config-file", "pyproject.toml"]
