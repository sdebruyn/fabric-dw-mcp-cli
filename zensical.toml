[project]
site_dir = "docs_build/site"
site_name = "fabric-dw"
site_description = "Python CLI + MCP server for administering Microsoft Fabric Data Warehouses and SQL Analytics Endpoints."
site_url = "https://fdw.debruyn.dev"
site_author = "Sam Debruyn"
repo_url = "https://github.com/sdebruyn/fabric-dw-mcp-cli"
repo_name = "sdebruyn/fabric-dw-mcp-cli"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2026 Sam Debruyn"

watch = ["README.md", "CONTRIBUTING.md", "LICENSE", "SECURITY.md", "CODE_OF_CONDUCT.md"]

nav = [
  { "Home" = "index.md" },
  { "Install" = "install.md" },
  { "Concepts" = "concepts.md" },
  { "Commands" = [
    { "Overview" = "commands/index.md" },
    { "Audit" = "commands/audit.md" },
    { "Cache" = "commands/cache.md" },
    { "Completion" = "commands/completion.md" },
    { "Configuration & defaults" = "commands/config.md" },
    { "dbt" = "commands/dbt.md" },
    { "Functions" = "commands/functions.md" },
    { "Queries" = "commands/queries.md" },
    { "Restore Points" = "commands/restore-points.md" },
    { "Running SQL" = "commands/sql.md" },
    { "Schemas" = "commands/schemas.md" },
    { "Settings" = "commands/settings.md" },
    { "Snapshots" = "commands/snapshots.md" },
    { "SQL Analytics Endpoints" = "commands/sql-endpoints.md" },
    { "SQL Pools" = "commands/sql-pools.md" },
    { "Statistics" = "commands/statistics.md" },
    { "Stored procedures" = "commands/procedures.md" },
    { "Tables" = "commands/tables.md" },
    { "Views" = "commands/views.md" },
    { "Warehouses" = "commands/warehouses.md" },
    { "Workspaces" = "commands/workspaces.md" }
  ] },
  { "Reference" = [
    { "Authentication" = "authentication.md" },
    { "Agent Skills" = "skills.md" },
    { "MCP server setup" = "mcp.md" },
    { "Exit codes" = "reference/exit-codes.md" },
    { "Shell Completion" = "completion.md" },
    { "Troubleshooting" = "troubleshooting.md" }
  ] },
  { "Guides" = [
    { "Ingesting data" = "guides/ingesting-data.md" },
    { "Query performance" = "guides/query-performance.md" }
  ] },
  { "Contributing" = [
    { "Contributing" = "contributing.md" },
    { "Code of Conduct" = "code-of-conduct.md" },
    { "License" = "license.md" },
    { "Security" = "security.md" }
  ] }
]

[project.theme]
custom_dir = "overrides"
language = "en"
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
features = [
  "content.action.edit",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tooltips",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "light green"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "light green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.extra.analytics]
provider = "custom"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/sdebruyn/fabric-dw-mcp-cli"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/samueldebruyn/"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://x.com/s_debruyn"

[[project.extra.social]]
icon = "fontawesome/solid/globe"
link = "https://debruyn.dev"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
check_paths = true
base_path = ["."]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
