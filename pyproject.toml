[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fabric-dw-mcp-cli"
dynamic = ["version"]
requires-python = ">=3.11"
description = "Microsoft Fabric Data Warehouse MCP CLI"
license = { text = "MIT" }
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "azure-identity>=1.19",
    "pydantic>=2.9",
    "httpx[http2]>=0.27",
    "aiolimiter>=1.2",
    "tenacity>=9",
    "mssql-python>=0.13",
    "filelock>=3.16",
    "mcp[cli]>=1.0",
    "click>=8.2",
    "rich>=14",
    "anyio>=4",
]

[project.scripts]
fabric-dw = "fabric_dw.cli:main"
fabric-dw-mcp = "fabric_dw.mcp.server:run"

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "anyio[trio]",
    "respx>=0.21",
    "freezegun>=1.5",
    "pytest-randomly",
    "pytest-cov",
    "mypy",
    "ruff",
    "pre-commit",
]

[dependency-groups]
docs = ["zensical>=0.0.42"]

[tool.hatch.version]
path = "src/fabric_dw/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/fabric_dw"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "N", "UP", "B", "SIM", "ANN", "RUF", "PL",
    "C4", "DTZ", "ARG", "PT", "TRY", "LOG", "S", "FBT", "RET", "PIE",
    "TID", "ICN", "T20", "ERA", "PERF", "FURB",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "S101", "PLR2004"]
"src/fabric_dw/services/**" = ["PLR0913"]
# Click injects bool flags via decorators; FBT001 is a false-positive for Click commands.
"src/fabric_dw/cli/**" = ["FBT001"]

[tool.ruff.format]

[tool.mypy]
strict = true
python_version = "3.11"
mypy_path = "src"
packages = ["fabric_dw"]

[tool.pytest.ini_options]
markers = ["integration: hits real Fabric APIs"]
addopts = "-ra --strict-markers"
asyncio_mode = "auto"
